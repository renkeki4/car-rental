{% extends "base.html" %}

{% block content %}
<h2>Редактирование автомобиля</h2>
<form method="POST" action="{{ url_for('edit_car', car_id=car.id) }}" enctype="multipart/form-data">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="brand" class="form-label">Марка</label>
            <input type="text" class="form-control" id="brand" name="brand" value="{{ car.brand }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="model" class="form-label">Модель</label>
            <input type="text" class="form-control" id="model" name="model" value="{{ car.model }}" required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label for="year" class="form-label">Год выпуска</label>
            <input type="number" class="form-control" id="year" name="year" value="{{ car.year }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label for="body_type" class="form-label">Тип кузова</label>
            <input type="text" class="form-control" id="body_type" name="body_type" value="{{ car.body_type or '' }}">
        </div>
        <div class="col-md-4 mb-3">
            <label for="color" class="form-label">Цвет</label>
            <input type="text" class="form-control" id="color" name="color" value="{{ car.color or '' }}">
        </div>
    </div>
    <div class="mb-3">
        <label for="price_per_day" class="form-label">Цена за день (руб.)</label>
        <input type="number" step="0.01" class="form-control" id="price_per_day" name="price_per_day" value="{{ car.price_per_day }}" required>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Описание</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ car.description or '' }}</textarea>
    </div>
    <div class="mb-3">
        <label for="image" class="form-label">Фото автомобиля</label>
        <input type="file" class="form-control" id="image" name="image" accept="image/*">
        {% if car.image_url %}
            <div class="mt-2">
                <img src="{{ car.image_url }}" alt="Текущее фото" style="max-height: 100px;">
                <p class="text-muted small">Текущее фото (замените, загрузив новое)</p>
            </div>
        {% endif %}
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="is_available" name="is_available" {% if car.is_available %}checked{% endif %}>
        <label class="form-check-label" for="is_available">Доступен для аренды</label>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
